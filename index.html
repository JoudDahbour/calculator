<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Calculator</h1>
    </header>
    
    <main>
        <section class="display" aria-live="polite">
            <output class="display-previous"></output>
            <output class="display-expression"></output>
            <output class="display-result">0</output>
        </section>

        <section class="keypad">
            <button class="key key-clear" data-action="clear">C</button>
            <button class="key key-undo" data-action="undo">Undo</button>
            <button class="key key-operator" data-operator="/">&divide;</button>

            <button class="key key-number" data-action="number" data-value="7">7</button>
            <button class="key key-number" data-action="number" data-value="8">8</button>
            <button class="key key-number" data-action="number" data-value="9">9</button>
            <button class="key key-operator" data-operator="*">&times;</button>

            <button class="key key-number" data-action="number" data-value="4">4</button>
            <button class="key key-number" data-action="number" data-value="5">5</button>
            <button class="key key-number" data-action="number" data-value="6">6</button>
            <button class="key key-operator" data-operator="-">&minus;</button>

            <button class="key key-number" data-action="number" data-value="1">1</button>
            <button class="key key-number" data-action="number" data-value="2">2</button>
            <button class="key key-number" data-action="number" data-value="3">3</button>
            <button class="key key-operator" data-operator="+">&plus;</button>

            <button class="key key-number key-zero" data-value="0">0</button>
            <button class="key key-decimal" data-action="decimal">.</button>
            <button class="key key-equals" data-action="equals">=</button>
        </section>
    </main>

    <footer>
        <p>&copy; Calculator by Joud Dahbour</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
